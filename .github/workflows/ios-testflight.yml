name: iOS — Build & Deploy to TestFlight

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build & Upload to TestFlight
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: false
          working-directory: ios

      - name: Bundle install
        run: |
          cd ios
          bundle install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Setup Keychain
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
          security create-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "" build.keychain

          # Add to search list
          security list-keychains -s ~/Library/Keychains/build.keychain-db

      - name: Import Code-Signing Certificate
        run: |
          echo "${{ secrets.CERTIFICATES_P12 }}" | base64 --decode > /tmp/certs.p12

          # Import to login keychain first (standard practice)
          security import /tmp/certs.p12 \
            -k ~/Library/Keychains/login.keychain-db \
            -P "${{ secrets.CERTIFICATES_P12_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcodebuild \
            -A

          rm /tmp/certs.p12

          echo "=== Login Keychain Certificates ==="
          security find-identity -v -p codesigning

          echo ""
          echo "=== Certificate Details ==="
          security find-identity -v -p codesigning | grep -i distribution || echo "No distribution cert found"

      - name: Import Provisioning Profile
        uses: apple-actions/download-provisioning-profiles@v1
        with:
          bundle-id: 'read-en.ru'
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      - name: Check Provisioning Profiles
        run: |
          echo "=== Installed Provisioning Profiles ==="
          ls -lah ~/Library/MobileDevice/Provisioning\ Profiles/ || echo "No profiles found"
          echo ""
          echo "=== Extract Profile UUID ==="
          PROFILE_PATH=$(find ~/Library/MobileDevice/Provisioning\ Profiles/ -name "*.mobileprovision" | head -1)
          if [ -z "$PROFILE_PATH" ]; then
            echo "✗ ERROR: No provisioning profiles found!"
            exit 1
          fi
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | plutil -extract UUID raw - 2>/dev/null)
          if [ -z "$PROFILE_UUID" ]; then
            echo "✗ ERROR: Failed to extract UUID from provisioning profile!"
            exit 1
          fi
          echo "✓ Profile UUID: $PROFILE_UUID"
          echo "PROVISIONING_PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

          echo ""
          echo "=== Profile Details ==="
          TEAM_ID=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | plutil -extract TeamIdentifier.0 raw - 2>/dev/null)
          BUNDLE_ID=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | plutil -extract Entitlements.application-identifier raw - 2>/dev/null)
          echo "Team ID in profile: $TEAM_ID"
          echo "Bundle ID in profile: $BUNDLE_ID"
          echo "Expected Team ID: ${{ secrets.APPLE_TEAM_ID }}"
          echo ""
          echo "=== Available Certificates ==="
          security find-identity -v -p codesigning 2>/dev/null || echo "No certificates found"

      - name: Build & Archive
        run: |
          cd ios

          # Allow codesign to use keychain without prompting
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" ~/Library/Keychains/login.keychain-db || true

          echo "=== Starting Build ==="
          xcodebuild archive \
            -workspace reedle.xcworkspace \
            -scheme reedle \
            -configuration Release \
            -archivePath $RUNNER_TEMP/reedle.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            PROVISIONING_PROFILE_SPECIFIER=${{ env.PROVISIONING_PROFILE_UUID }} \
            -verbose 2>&1 | tee build.log

          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "✗ Build failed with exit code: $BUILD_EXIT_CODE"
            echo ""
            echo "=== Build Errors ==="
            grep -i "error:" ios/build.log | head -20
            exit $BUILD_EXIT_CODE
          fi
          echo "✓ Build succeeded"

      - name: Show Build Log on Failure
        if: failure()
        run: |
          echo "=== Build Log (Last 100 lines) ==="
          tail -100 ios/build.log || echo "Log file not found"
          echo ""
          echo "=== All Errors ==="
          grep -i "error:" ios/build.log || echo "No errors found in log"

      - name: Verify Archive Exists
        run: |
          echo "Archive path: $RUNNER_TEMP/reedle.xcarchive"
          if [ -d "$RUNNER_TEMP/reedle.xcarchive" ]; then
            echo "✓ Archive found"
            du -sh "$RUNNER_TEMP/reedle.xcarchive"
            ls -lah "$RUNNER_TEMP/reedle.xcarchive" | head -20
          else
            echo "✗ Archive NOT found at $RUNNER_TEMP/reedle.xcarchive"
            echo ""
            echo "=== Checking $RUNNER_TEMP ==="
            ls -lah "$RUNNER_TEMP" || echo "Cannot list RUNNER_TEMP"
            exit 1
          fi

      - name: Export IPA
        run: |
          cd ios
          echo "Starting IPA export..."
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/reedle.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist ExportOptions.plist \
            -verbose 2>&1 | tee export.log

          EXPORT_EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXPORT_EXIT_CODE -ne 0 ]; then
            echo "✗ Export failed with exit code: $EXPORT_EXIT_CODE"
            echo ""
            echo "=== Export Error Details ==="
            grep -i "error\|failed\|exception" ios/export.log || echo "No error patterns found"
            exit $EXPORT_EXIT_CODE
          fi
          echo "✓ Export succeeded"
          ls -lah $RUNNER_TEMP/export/

      - name: Show Export Log on Failure
        if: failure()
        run: |
          echo "=== Last 50 lines of export.log ==="
          if [ -f ios/export.log ]; then
            tail -50 ios/export.log
          else
            echo "export.log not found at ios/export.log"
            find . -name "export.log" -type f 2>/dev/null || echo "No export.log found anywhere"
          fi

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ${{ runner.temp }}/export/reedle.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}