name: iOS Build & Upload to TestFlight

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-latest

    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.1'
        bundler-cache: false
        working-directory: ios

    - name: Bundle install
      run: |
        cd ios
        export LANG=en_US.UTF-8
        export LC_ALL=en_US.UTF-8
        bundle install

    - name: Clear CocoaPods cache
      run: |
        rm -rf ~/Library/Caches/CocoaPods
        rm -rf ~/.cocoapods/repos/master
        rm -rf ~/.cocoapods/repos/trunk

    - name: Install Pods
      timeout-minutes: 10
      run: |
        cd ios
        export LANG=en_US.UTF-8
        export LC_ALL=en_US.UTF-8
        bundle exec pod install

    - name: Clean build folder
      run: |
        cd ios
        xcodebuild clean -workspace reedle.xcworkspace -scheme reedle

    - name: Install Certificate and Provisioning Profile
      env:
        CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
        CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
      run: |
        # Decode and install certificate
        mkdir -p ~/Library/Keychains
        echo $CERTIFICATE_BASE64 | base64 --decode > certificate.p12

        # Create a temporary keychain
        security create-keychain -p "" github_actions.keychain
        security default-keychain -s github_actions.keychain
        security unlock-keychain -p "" github_actions.keychain

        # Import certificate
        security import certificate.p12 -k github_actions.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security || true

        # Install provisioning profile
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/reedle.mobileprovision"
        echo $PROVISIONING_PROFILE_BASE64 | base64 --decode > "$PROFILE_PATH"

        # Extract UUID and Name from provisioning profile
        security cms -D -i "$PROFILE_PATH" > /tmp/profile.plist 2>/dev/null
        PROFILE_UUID=$(plutil -extract UUID raw /tmp/profile.plist 2>/dev/null)
        PROFILE_NAME=$(plutil -extract Name raw /tmp/profile.plist 2>/dev/null)

        echo "Profile Name: $PROFILE_NAME"
        echo "Profile UUID: $PROFILE_UUID"

        # Rename file to UUID
        if [ -n "$PROFILE_UUID" ]; then
          mv "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
        fi

        # Use profile UUID for provisioning profile specifier
        if [ -n "$PROFILE_UUID" ]; then
          echo "PROVISIONING_PROFILE_SPECIFIER=$PROFILE_UUID" >> $GITHUB_ENV
        else
          echo "PROVISIONING_PROFILE_SPECIFIER=" >> $GITHUB_ENV
        fi

        rm certificate.p12

    - name: Decode API Key
      env:
        APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo $APP_STORE_CONNECT_API_KEY | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

    - name: Build iOS app
      timeout-minutes: 30
      run: |
        cd ios
        xcodebuild \
          -workspace reedle.xcworkspace \
          -scheme reedle \
          -configuration Release \
          -derivedDataPath build \
          -arch arm64 \
          CODE_SIGN_IDENTITY="Apple Distribution" \
          CODE_SIGN_STYLE=Manual \
          PROVISIONING_PROFILE_SPECIFIER=$PROVISIONING_PROFILE_SPECIFIER \
          DEVELOPMENT_TEAM=244U6W36E7

    - name: Create Archive
      timeout-minutes: 30
      run: |
        cd ios
        xcodebuild \
          -workspace reedle.xcworkspace \
          -scheme reedle \
          -configuration Release \
          -archivePath build/reedle.xcarchive \
          CODE_SIGN_IDENTITY="Apple Distribution" \
          CODE_SIGN_STYLE=Manual \
          PROVISIONING_PROFILE_SPECIFIER=$PROVISIONING_PROFILE_SPECIFIER \
          DEVELOPMENT_TEAM=244U6W36E7 \
          archive

    - name: Export IPA from Archive
      timeout-minutes: 15
      run: |
        cd ios
        cat > /tmp/export-options.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>method</key>
          <string>app-store</string>
          <key>signingStyle</key>
          <string>automatic</string>
          <key>stripSwiftSymbols</key>
          <true/>
        </dict>
        </plist>
        EOF
        xcodebuild -exportArchive \
          -archivePath build/reedle.xcarchive \
          -exportPath build \
          -exportOptionsPlist /tmp/export-options.plist

    - name: Upload to TestFlight
      timeout-minutes: 20
      env:
        APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      run: |
        cd ios
        fastlane upload_testflight

    - name: Comment PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '✅ Build uploaded to TestFlight\n\nYou can now download it from App Store Connect TestFlight tab.'
          })

    - name: Upload Podfile.lock
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: podfile-lock
        path: ios/Podfile.lock
        retention-days: 7

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa
        path: ios/build/*.ipa
        retention-days: 30
