name: iOS — Build & Deploy to TestFlight

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build & Upload to TestFlight
    runs-on: macos-15

    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 17
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false
          working-directory: ios

      - name: Install Bundler & Gems
        run: |
          cd ios
          gem install bundler -v "~> 2.6"
          bundle config set --local path 'vendor/bundle'
          bundle install --jobs 4 --retry 3

      - name: Install CocoaPods
        run: |
          cd ios
          bundle exec pod install --repo-update

      # ⚙️ Fastlane setup_ci создаст временный keychain ПРАВИЛЬНО:
      # - создаст fastlane_tmp_keychain
      # - сделает его default
      # - добавит к существующим (НЕ заменит)
      # - разблокирует с правильными настройками
      - name: Setup Fastlane CI Keychain
        run: |
          cd ios
          bundle exec fastlane run setup_ci

      - name: Import Code-Signing Certificate
        run: |
          cd ios
          # Декодируем сертификат
          echo "${{ secrets.CERTIFICATES_P12 }}" | base64 --decode > /tmp/certs.p12

          # Импортируем в fastlane keychain (созданный setup_ci)
          bundle exec fastlane run import_certificate \
            certificate_path:/tmp/certs.p12 \
            certificate_password:"${{ secrets.CERTIFICATES_P12_PASSWORD }}" \
            keychain_name:fastlane_tmp_keychain \
            keychain_password:""

          rm /tmp/certs.p12

          echo ""
          echo "=== Imported Certificates ==="
          security find-identity -v -p codesigning

      - name: Download Provisioning Profile
        uses: apple-actions/download-provisioning-profiles@v1
        with:
          bundle-id: 'read-en.ru'
          profile-type: 'IOS_APP_STORE'
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      - name: Verify Profile & Extract UUID
        run: |
          echo "=== Installed Provisioning Profiles ==="
          ls -lah ~/Library/MobileDevice/Provisioning\ Profiles/ || (echo "✗ No profiles!" && exit 1)

          PROFILE_PATH=$(find ~/Library/MobileDevice/Provisioning\ Profiles/ -name "*.mobileprovision" | head -1)
          if [ -z "$PROFILE_PATH" ]; then
            echo "✗ ERROR: No provisioning profiles found!"
            exit 1
          fi

          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
          PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -)
          PROFILE_TEAM=$(security cms -D -i "$PROFILE_PATH" | plutil -extract TeamIdentifier.0 raw -)
          PROFILE_BUNDLE=$(security cms -D -i "$PROFILE_PATH" | plutil -extract Entitlements.application-identifier raw -)

          echo "✓ Profile UUID:      $PROFILE_UUID"
          echo "✓ Profile Name:      $PROFILE_NAME"
          echo "✓ Profile Team ID:   $PROFILE_TEAM"
          echo "✓ Profile Bundle ID: $PROFILE_BUNDLE"
          echo ""
          echo "Expected Team ID: ${{ secrets.APPLE_TEAM_ID }}"

          # Сохраняем для fastlane
          echo "PROVISIONING_PROFILE_SPECIFIER=$PROFILE_UUID" >> $GITHUB_ENV

      - name: Build via Fastlane
        env:
          PROVISIONING_PROFILE_SPECIFIER: ${{ env.PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          cd ios
          bundle exec fastlane build_testflight

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        run: |
          # Создаем директорию для API ключа (нужно Fastfile)
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APPSTORE_PRIVATE_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8

          cd ios
          bundle exec fastlane upload_testflight

      - name: Show Logs on Failure
        if: failure()
        run: |
          echo "=== Fastlane Logs ==="
          ls -la ios/fastlane/report.xml 2>/dev/null && cat ios/fastlane/report.xml || echo "No report.xml"
          echo ""
          echo "=== Build Logs ==="
          find ~/Library/Logs/gym -type f -name "*.log" 2>/dev/null | head -5 | while read log; do
            echo "--- $log ---"
            tail -100 "$log"
          done

      - name: Upload Build Artifacts on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ios/fastlane/report.xml
            ~/Library/Logs/gym/*.log
          retention-days: 7
          if-no-files-found: ignore
