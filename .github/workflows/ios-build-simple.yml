name: iOS Build (Simple)

# Более простой workflow для быстрой сборки без подписи
on:
  workflow_dispatch:  # Запуск только вручную
  push:
    branches: [ develop ]

jobs:
  build:
    runs-on: macos-latest

    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: npm install
      run: npm install

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.1'
        bundler-cache: false
        working-directory: ios

    - name: Bundle install
      run: |
        cd ios
        export LANG=en_US.UTF-8
        export LC_ALL=en_US.UTF-8
        bundle install

    - name: Clear CocoaPods cache
      run: |
        rm -rf ~/Library/Caches/CocoaPods
        rm -rf ~/.cocoapods/repos/master
        rm -rf ~/.cocoapods/repos/trunk

    - name: pod install
      run: |
        cd ios
        export LANG=en_US.UTF-8
        export LC_ALL=en_US.UTF-8
        bundle exec pod install --repo-update

    - name: Build
      run: |
        cd ios
        xcodebuild \
          -workspace read_en.xcworkspace \
          -scheme read_en \
          -configuration Debug \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-debug-build
        path: ios/build
        retention-days: 7
